name: flutter_boilerplate
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_email_sender: ^8.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  dart_style: ^3.1.7
  rename: ^3.1.0
  provider: ^6.1.1
  dio: ^5.4.1
  json_annotation: ^4.8.1
  shared_preferences: ^2.2.2
  package_info_plus: ^10.1.0
  share_plus: ^13.1.0
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets: 
  - assets/images/
  - assets/icons/
  generate: true
